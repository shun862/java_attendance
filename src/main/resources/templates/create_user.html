<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>新規作成</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column justify-content-between" style="height: 100vh;">
	<h2 class="text-center mt-4">新規作成</h2>
	<form th:action="@{/create_user}" th:object="${userForm}" method="post">
		<div class="d-flex justify-content-center">
			<div class="border rounded p-4 bg-white shadow" style="width: 800px;">
				<div class="mb-3">
				    <label class="form-label">ユーザー名</label>

				    <input type="text"
				           class="form-control"
				           placeholder="Username"
				           th:field="*{username}"
				           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''">

				    <div class="invalid-feedback"
				         th:if="${#fields.hasErrors('username')}"
				         th:errors="*{username}">
				    </div>
				</div>

				<div class="mb-3">
				    <label class="form-label">パスワード</label>

				    <input type="password"
				           class="form-control"
				           placeholder="Password"
				           th:field="*{password}"
				           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">

				    <div class="invalid-feedback"
				         th:if="${#fields.hasErrors('password')}"
				         th:errors="*{password}">
				    </div>
				</div>
				
				<div class="text-end">
					<button type="submit" class="btn btn-primary" style="width: 200px;">新規作成</button>
				</div>
			</div>
		</div>
	</form>
	<div class="text-center mb-4">
		<a th:href="@{/login_view}">ログイン</a>
	</div>
</body>

</html>
