<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>勤怠修正申請</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container vh-100 d-flex flex-column justify-content-between">

    <!-- 上部タイトル -->
    <div class="text-center mt-5">
        <h2 class="fw-bold">修正申請</h2>
    </div>

    <!-- 中央コンテンツ -->
    <div class="d-flex flex-column align-items-center">

        <!-- 修正日 -->
        <div class="mb-5">
            <h5 class="text-center" th:text="${#temporals.format(attendanceForm?.workDate, 'yyyy年M月d日')}">
                    2026年2月8日
            </h5>
        </div>
		
		<form th:action="@{/user/attendance/application_check}"
		      th:object="${attendanceForm}"
		      method="post"
		      class="w-50">

		    <input type="hidden" th:field="*{workDate}" />

		    <!-- 出勤時刻 -->
		    <div class="mb-3">
		        <label class="form-label">出勤時刻</label>
		        <input type="time"
		               class="form-control"
		               th:field="*{clockIn}"
		               th:classappend="${#fields.hasErrors('clockIn')} ? 'is-invalid'">

		        <div class="invalid-feedback"
		             th:errors="*{clockIn}">
		        </div>
		    </div>

		    <!-- 退勤時刻 -->
		    <div class="mb-3">
		        <label class="form-label">退勤時刻</label>
		        <input type="time"
		               class="form-control"
		               th:field="*{clockOut}"
		               th:classappend="${#fields.hasErrors('clockOut')} ? 'is-invalid'">

		        <div class="invalid-feedback"
		             th:errors="*{clockOut}">
		        </div>
		    </div>

		    <!-- 相関エラー（出勤 < 退勤） -->
		    <div class="text-danger mb-3"
		         th:if="${#fields.hasErrors('validTimeOrder')}"
		         th:errors="*{validTimeOrder}">
		    </div>

		    <!-- ボタン -->
		    <div class="d-flex justify-content-evenly mt-4">
		        <a th:href="@{/user/attendance_list}" class="btn btn-secondary">
		            一覧
		        </a>
		        <button type="submit" class="btn btn-primary">
		            申請
		        </button>
		    </div>
		</form>

    </div>

    <!-- フッター余白 -->
    <div></div>

</div>

</body>
</html>
