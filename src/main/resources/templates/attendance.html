<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="_csrf" th:content="${_csrf.token}">
	<meta name="_csrf_header" th:content="${_csrf.headerName}">
	<title>勤怠登録</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body,
		html {
			height: 100%;
		}

		.clock {
			font-size: 4rem;
			font-weight: bold;
		}

		.attendance-btn {
			width: 200px;
			height: 90px;
			font-size: 2rem;
		}
	</style>
</head>

<body class="bg-light">
	<div class="container-fluid h-100 position-relative">
		<div class="position-absolute top-0 start-0 mt-5 ms-5">
			<a th:href="@{/user/attendance_list}" class="btn btn-outline-secondary">
				勤怠一覧
			</a>
		</div>
		<div class="position-absolute top-0 start-50 translate-middle-x mt-4" style="width: 50%; min-width: 320px;">
			<div id="messageArea" class="alert text-center d-none" role="alert"></div>
		</div>
		<div class="d-flex flex-column justify-content-center align-items-center h-100">
			<h3 th:text="${today}"></h3>

			<div class="mb-5">
				<div id="clock" class="clock"></div>
			</div>

			<div class="d-flex gap-5">
				<button type="button" class="btn btn-primary attendance-btn" onclick="clockIn()">
					出勤
				</button>

				<button type="button" class="btn btn-danger attendance-btn" onclick="clockOut()">
					退勤
				</button>
			</div>
		</div>
	</div>

	<script>
		function updateClock() {
			const now = new Date();
			const hh = String(now.getHours()).padStart(2, '0');
			const mm = String(now.getMinutes()).padStart(2, '0');
			const ss = String(now.getSeconds()).padStart(2, '0');

			document.getElementById('clock').textContent =
				`${hh}:${mm}:${ss}`;
		}
		updateClock(); // 初回即時表示
		setInterval(updateClock, 1000);
	</script>

	<script>
		function showMessage(message, success) {
			const area = document.getElementById('messageArea');

			area.textContent = message;
			area.className = success
				? 'alert alert-success text-center'
				: 'alert alert-danger text-center';

			area.classList.remove('d-none');

			setTimeout(() => {
				area.classList.add('d-none');
			}, 3000);
		}

		function clockIn() {
			fetch('attendance/clockin', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					[getCsrfHeader()]: getCsrfToken()
				}
			})
				.then(res => res.json())
				.then(data => {
					showMessage(data.message, data.success);
				})
				.catch(() => {
					showMessage('通信エラーが発生しました', false);
				});
		}

		function clockOut() {
			fetch('attendance/clockout', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					[getCsrfHeader()]: getCsrfToken()
				}
			})
				.then(res => res.json())
				.then(data => {
					showMessage(data.message, data.success);
				})
				.catch(() => {
					showMessage('通信エラーが発生しました', false);
				});
		}
	</script>

	<script>
		function getCsrfToken() {
			return document
				.querySelector('meta[name="_csrf"]')
				.getAttribute('content');
		}

		function getCsrfHeader() {
			return document
				.querySelector('meta[name="_csrf_header"]')
				.getAttribute('content');
		}
	</script>

</body>

</html>
